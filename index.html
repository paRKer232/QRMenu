      function fileToOptimizedDataUrl(file, maxDim = 900, quality = 0.82) {
        const hasAlpha =
          file.type === "image/png" ||
          file.type === "image/webp" ||
          file.type === "image/gif";
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error("read failed"));
          reader.onload = (e) => {
            const img = new Image();
            img.onerror = () => reject(new Error("decode failed"));
            img.onload = () => {
              let { width, height } = img;
              if (width > maxDim || height > maxDim) {
                if (width > height) {
                  height = Math.round(height * (maxDim / width));
                  width = maxDim;
                } else {
                  width = Math.round(width * (maxDim / height));
                  height = maxDim;
                }
              }
              const canvas = document.createElement("canvas");
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, width, height);
              resolve(
                hasAlpha
                  ? canvas.toDataURL("image/png")
                  : canvas.toDataURL("image/jpeg", quality),
              );
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function uid(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 9);
      }

      function escapeHtml(str) {
        const d = document.createElement("div");
        d.textContent = str == null ? "" : String(str);
        return d.innerHTML;
      }

      async function loadData() {
        try {
          const { data, error } = await supabaseClient.rpc("get_menu", {
            p_slug: MENU_SLUG,
          });
          if (error) throw error;
          state = data ? data : defaultData();
        } catch (e) {
          state = defaultData();
        }
        if (!state.sections) state.sections = [];
        activeSection = state.sections[0] ? state.sections[0].id : null;
        render();
        document.getElementById("app").classList.add("ready");
      }

      let dirty = false;

      function markDirty() {
        dirty = true;
        updatePublishUI();
        render();
      }

      function updatePublishUI() {
        const btn = document.getElementById("publishLiveBtn");
        const status = document.getElementById("publishStatus");
        if (btn) {
          btn.disabled = !dirty;
          btn.textContent = dirty ? "Publish live" : "Published";
        }
        if (status) {
          status.textContent = dirty
            ? "You have unpublished changes"
            : "Everything is published";
          status.classList.toggle("dirty", dirty);
        }
      }

      async function publishLive() {
        const btn = document.getElementById("publishLiveBtn");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Publishing…";
        }
        try {
          const { data, error } = await supabaseClient.rpc("save_menu", {
            p_slug: MENU_SLUG,
            p_pin: sessionPin,
            p_data: state,
          });
          if (error || data !== true) throw new Error("save rejected");
          dirty = false;
          showToast("Published live");
        } catch (e) {
          showToast("Could not publish — check connection");
        }
        updatePublishUI();
      }

        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.remove("hidden");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => t.classList.add("hidden"), 1800);

      function renderTabs() {
        const tabs = document.getElementById("tabs");
        tabs.innerHTML = "";
        state.sections.forEach((sec) => {
          const b = document.createElement("button");
          b.className = "tab" + (sec.id === activeSection ? " active" : "");
          b.textContent = sec.title || "Untitled";
          b.dataset.sid = sec.id;
          b.onclick = () => selectSection(sec.id);
          tabs.appendChild(b);
        });
        updateTabArrows();
      }

      function selectSection(id) {
        activeSection = id;
        // Only toggle the active class instead of tearing down and
        // rebuilding every tab button — rebuilding on every tap was what
        // made the tabs feel janky, and it also meant the button being
        // tapped had already been removed from the DOM by the time we
        // tried to scroll it into view, so that scroll silently failed.
        document.querySelectorAll("#tabs .tab").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.sid === id);
        });
        renderMenu();
        const activeBtn = document.querySelector("#tabs .tab.active");
        if (activeBtn) {
          activeBtn.scrollIntoView({
            behavior: "smooth",
            inline: "center",
            block: "nearest",
          });
        }
      }

      function renderMenu() {
        const menu = document.getElementById("menu");
        const sec = state.sections.find((s) => s.id === activeSection);
        if (!sec) {
          menu.innerHTML =
            '<p class="empty-state">No sections yet. Open owner settings to add your first category.</p>';
          return;
        }
        const currency = state.business.currency || "$";
        let html = `<h3 class="section-heading">${escapeHtml(sec.title)}</h3>`;
        if (!sec.items || sec.items.length === 0) {
          html += '<p class="empty-state">No items in this section yet.</p>';
        } else {
          sec.items.forEach((it) => {
            const badges = (it.tags || [])
              .map((t) =>
                TAG_META[t]
                  ? `<span class="badge" title="${TAG_META[t].title}">${TAG_META[t].label}</span>`

          </div>
          ${descHtml}`;

<div class="item has-image ${it.available === false ? "unavailable" : ""}">

  <div class="item-body">${rowHtml}</div>
</div>`;

            }

        const val = document.getElementById("pinInput").value.trim();
        try {
          const { data, error } = await supabaseClient.rpc("check_pin", {
            p_slug: MENU_SLUG,
            p_pin: val,

          if (data === true) {
            sessionPin = val;
            unlocked = true;
            renderAdmin();
          } else {
            showToast("Incorrect PIN");
          }
        } catch (e) {
          showToast("Could not verify PIN — check connection");
        }
      }

      async function updatePin() {
        const newPin = document.getElementById("fPin").value.trim();
        if (!newPin) {
          showToast("Enter a new PIN first");
          return;
        }
        if (newPin === sessionPin) {
          showToast("That's already the current PIN");
          return;
        }
        const { data, error } = await supabaseClient.rpc("change_pin", {
          p_slug: MENU_SLUG,
          p_old_pin: sessionPin,
          p_new_pin: newPin,
        });
        if (!error && data === true) {
          sessionPin = newPin;
          showToast("PIN updated");
        } else showToast("Could not update PIN");

        const box = document.getElementById("qrcode");

        box.innerHTML = "";
        const url = state.publishedUrl;
        if (!url) {
          box.innerHTML =
            '<p class="url-note">Add a URL above to generate a code.</p>';
          return;
        }
        try {
          new QRCode(box, {
            text: url,
            width: 170,
            height: 170,
            colorDark:
              getComputedStyle(document.body)
                .getPropertyValue("--accent")
                .trim() || "#000000",
            colorLight: "#FBF8F1",
          });
        } catch (e) {
          box.innerHTML = '<p class="url-note">Could not generate QR code.</p>';

      }

      function moveSection(id, dir) {
        const idx = state.sections.findIndex((s) => s.id === id);
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= state.sections.length) return;
        const tmp = state.sections[idx];
        state.sections[idx] = state.sections[newIdx];
        state.sections[newIdx] = tmp;
        markDirty();
        renderAdmin();
      }

      function buildItemCard(sectionId, item) {
        const div = document.createElement("div");
        div.className = "admin-item-card";
        div.innerHTML = `
    <div class="row">
      <input type="text" value="${escapeHtml(item.name)}" data-field="name" placeholder="Item name">
      <input type="text" value="${escapeHtml(item.price)}" data-field="price" placeholder="Price" style="max-width:90px;">
    </div>
    <div class="field">
      <label>Image</label>
      <div class="image-field-row">
        <input type="text" value="${escapeHtml(item.image && !item.image.startsWith("data:") ? item.image : "")}" data-field="image" placeholder="Image URL (optional)">
        <label class="btn btn-sm image-upload-btn">Upload
          <input type="file" accept="image/*" data-field="imageFile" hidden>
        </label>
      </div>
      <div class="image-preview-wrap" data-field="imagePreviewWrap" ${item.image ? "" : 'style="display:none;"'}>
        <img class="image-preview" data-field="imagePreview" src="${escapeHtml(item.image || "")}" alt="">
        <button type="button" class="btn btn-sm btn-danger" data-field="removeImage">Remove image</button>
      </div>
    </div>
    <div class="field"><textarea data-field="description" placeholder="Short description">${escapeHtml(item.description)}</textarea></div>
    <div class="tag-toggles"></div>
    <div class="item-card-foot">
      <label class="avail-toggle"><input type="checkbox" data-field="available" ${item.available !== false ? "checked" : ""}> Available</label>
      <button class="btn btn-sm btn-danger" data-field="delete">Delete item</button>
    </div>
  `;
        const nameInput = div.querySelector('[data-field="name"]');
        const priceInput = div.querySelector('[data-field="price"]');
        const imageInput = div.querySelector('[data-field="image"]');
        const imageFileInput = div.querySelector('[data-field="imageFile"]');
        const imagePreviewWrap = div.querySelector(
          '[data-field="imagePreviewWrap"]',
        );
        const imagePreview = div.querySelector('[data-field="imagePreview"]');
        const removeImageBtn = div.querySelector('[data-field="removeImage"]');
        const descInput = div.querySelector('[data-field="description"]');
        const availInput = div.querySelector('[data-field="available"]');
        const deleteBtn = div.querySelector('[data-field="delete"]');
        const tagWrap = div.querySelector(".tag-toggles");

        function findItem() {
          const sec = state.sections.find((s) => s.id === sectionId);
          return sec ? sec.items.find((i) => i.id === item.id) : null;
        }

        Object.keys(TAG_META).forEach((tagKey) => {
          const chip = document.createElement("span");
          chip.className =
            "tag-chip" + ((item.tags || []).includes(tagKey) ? " on" : "");
          chip.textContent = TAG_META[tagKey].label;
          chip.title = TAG_META[tagKey].title;
          chip.onclick = () => {
            const cur = findItem();
            if (!cur) return;
            cur.tags = cur.tags || [];
            const i = cur.tags.indexOf(tagKey);
            if (i > -1) cur.tags.splice(i, 1);
            else cur.tags.push(tagKey);
            chip.classList.toggle("on");
            markDirty();
          };
          tagWrap.appendChild(chip);
        });

        nameInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.name = nameInput.value.trim() || "Untitled item";
            markDirty();
          }
        };
        priceInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.price = priceInput.value.trim() || "0.00";
            markDirty();
          }
        };
        function setPreview(url) {
          if (url) {
            imagePreview.src = url;
            imagePreviewWrap.style.display = "";
          } else {
            imagePreview.src = "";
            imagePreviewWrap.style.display = "none";
          }
        }

        imageInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.image = imageInput.value.trim();
            setPreview(cur.image);
            markDirty();
          }
        };

        imageFileInput.onchange = async () => {
          const file = imageFileInput.files && imageFileInput.files[0];
          if (!file) return;
          if (!file.type.startsWith("image/")) {
            showToast("Please choose an image file");
            imageFileInput.value = "";
            return;
          }
          try {
            const dataUrl = await fileToOptimizedDataUrl(file);
            const cur = findItem();
            if (cur) {
              cur.image = dataUrl;
              imageInput.value = "";
              setPreview(dataUrl);
              markDirty();
              showToast("Image uploaded");
            }
          } catch (e) {
            showToast("Could not process that image");
          }
          imageFileInput.value = "";
        };

        removeImageBtn.onclick = () => {
          const cur = findItem();
          if (cur) {
            cur.image = "";
            imageInput.value = "";
            setPreview("");
            markDirty();
          }
        };
        descInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.description = descInput.value.trim();
            markDirty();
          }
        };
        availInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.available = availInput.checked;
            markDirty();
          }
        };
        deleteBtn.onclick = () => {
          const sec = state.sections.find((s) => s.id === sectionId);
          sec.items = sec.items.filter((i) => i.id !== item.id);
          markDirty();
          renderAdmin();
        };

        return div;
      }

      function addSection() {
        const sec = {
          id: uid("s"),
          title: "New section",
          items: [],
        };
        state.sections.push(sec);
        if (!activeSection) activeSection = sec.id;
        markDirty();
        renderAdmin();
      }

      initAdminVisibility();
      loadData();
    </script>
  </body>
</html>
