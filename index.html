<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Digital Menu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <p class="eyebrow">Menu</p>
        <h1 id="bizName">&nbsp;</h1>
        <p class="tagline" id="bizTagline">&nbsp;</p>
        <div class="hero-rule"></div>
      </header>

      <nav class="tabs" id="tabs"></nav>
      <main class="menu" id="menu"></main>

      <button
        class="fab"
        id="adminToggle"
        title="Owner settings"
        aria-label="Owner settings"
      >
        ⚙
      </button>

      <div class="overlay hidden" id="overlay">
        <div class="panel" id="panel"></div>
      </div>

      <div class="toast hidden" id="toast"></div>
    </div>

    <script>
      const SUPABASE_URL = "https://kwjqeqkvmnwsbeddhcun.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3anFlcWt2bW53c2JlZGRoY3VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjMxODQsImV4cCI6MjA5NjUzOTE4NH0.OA-lNRtUvprPh4IwYxTBL8-illZ5hvQ3oOuIXT8r800";
      const MENU_SLUG = "cafe-aurora"; // unique per business — change this for each site you deploy
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      const TAG_META = {
        veg: { label: "V", title: "Vegetarian" },
        vegan: { label: "VG", title: "Vegan" },
        gf: { label: "GF", title: "Gluten-free" },
        spicy: { label: "🌶", title: "Spicy" },
        new: { label: "NEW", title: "New" },
      };
      const THEME_NAMES = {
        navy: "Navy",
        wine: "Wine",
        sage: "Sage",
        clay: "Clay",
        charcoal: "Charcoal",
      };

      function defaultData() {
        return {
          business: {
            name: "Café Aurora",
            tagline: "Slow mornings, honest coffee",
            currency: "$",
            accent: "sage",
          },
          publishedUrl: "",
          sections: [
            {
              id: "s1",
              title: "Coffee",
              items: [
                {
                  id: "i1",
                  name: "Espresso",
                  description: "Double shot, house blend",
                  price: "3.00",
                  tags: ["vegan"],
                  available: true,
                },
                {
                  id: "i2",
                  name: "Flat White",
                  description: "Espresso, steamed milk",
                  price: "4.50",
                  tags: [],
                  available: true,
                },
                {
                  id: "i3",
                  name: "Iced Matcha Latte",
                  description: "Ceremonial grade, oat milk",
                  price: "5.25",
                  tags: ["vegan", "new"],
                  available: true,
                },
              ],
            },
            {
              id: "s2",
              title: "Breakfast",
              items: [
                {
                  id: "i4",
                  name: "Avocado Toast",
                  description: "Sourdough, chili flake, lime",
                  price: "8.00",
                  tags: ["veg"],
                  available: true,
                },
                {
                  id: "i5",
                  name: "Shakshuka",
                  description: "Baked eggs, tomato, feta",
                  price: "9.50",
                  tags: ["gf"],
                  available: true,
                },
              ],
            },
            {
              id: "s3",
              title: "Pastries",
              items: [
                {
                  id: "i6",
                  name: "Almond Croissant",
                  description: "Baked fresh daily",
                  price: "4.00",
                  tags: ["veg"],
                  available: true,
                },
                {
                  id: "i7",
                  name: "Banana Bread",
                  description: "Walnut, brown butter",
                  price: "3.75",
                  tags: ["veg"],
                  available: false,
                },
              ],
            },
          ],
        };
      }

      let state = null;
      let activeSection = null;
      let unlocked = false;
      let qrObj = null;
      let sessionPin = null;

      function uid(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 9);
      }

      function escapeHtml(str) {
        const d = document.createElement("div");
        d.textContent = str == null ? "" : String(str);
        return d.innerHTML;
      }

      async function loadData() {
        try {
          const { data, error } = await supabaseClient.rpc("get_menu", {
            p_slug: MENU_SLUG,
          });
          if (error) throw error;
          state = data ? data : defaultData();
        } catch (e) {
          state = defaultData();
        }
        if (!state.sections) state.sections = [];
        activeSection = state.sections[0] ? state.sections[0].id : null;
        render();
      }

      async function saveData(showMsg) {
        try {
          const { data, error } = await supabaseClient.rpc("save_menu", {
            p_slug: MENU_SLUG,
            p_pin: sessionPin,
            p_data: state,
          });
          if (error || data !== true) throw new Error("save rejected");
          if (showMsg) showToast("Saved");
        } catch (e) {
          showToast("Could not save — check connection");
        }
        render();
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.remove("hidden");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => t.classList.add("hidden"), 1800);
      }

      /* ---------------- CUSTOMER VIEW ---------------- */

      function render() {
        document.body.setAttribute(
          "data-theme",
          state.business.accent || "sage",
        );
        document.getElementById("bizName").textContent =
          state.business.name || "Your Menu";
        document.getElementById("bizTagline").textContent =
          state.business.tagline || "";

        const tabs = document.getElementById("tabs");
        tabs.innerHTML = "";
        state.sections.forEach((sec) => {
          const b = document.createElement("button");
          b.className = "tab" + (sec.id === activeSection ? " active" : "");
          b.textContent = sec.title || "Untitled";
          b.onclick = () => {
            activeSection = sec.id;
            render();
          };
          tabs.appendChild(b);
        });

        const menu = document.getElementById("menu");
        const sec = state.sections.find((s) => s.id === activeSection);
        if (!sec) {
          menu.innerHTML =
            '<p class="empty-state">No sections yet. Open owner settings to add your first category.</p>';
          return;
        }
        const currency = state.business.currency || "$";
        let html = `<h3 class="section-heading">${escapeHtml(sec.title)}</h3>`;
        if (!sec.items || sec.items.length === 0) {
          html += '<p class="empty-state">No items in this section yet.</p>';
        } else {
          sec.items.forEach((it) => {
            const badges = (it.tags || [])
              .map((t) =>
                TAG_META[t]
                  ? `<span class="badge" title="${TAG_META[t].title}">${TAG_META[t].label}</span>`
                  : "",
              )
              .join("");
            const priceHtml =
              it.available === false
                ? '<span class="sold-out-tag">Unavailable right now</span>'
                : currency + escapeHtml(it.price);
            const descHtml = it.description
              ? `<p class="item-desc">${escapeHtml(it.description)}</p>`
              : "";
            const rowHtml = `
          <div class="item-row">
            <span class="item-name">${escapeHtml(it.name)}<span class="item-badges">${badges}</span></span>
            <span class="leader"></span>
            <span class="item-price">${priceHtml}</span>
          </div>
          ${descHtml}`;

            if (it.image) {
              html += `
        <div class="item has-image ${it.available === false ? "unavailable" : ""}">
          <img class="item-photo" src="${escapeHtml(it.image)}" alt="" loading="lazy">
          <div class="item-body">${rowHtml}</div>
        </div>`;
            } else {
              html += `
        <div class="item ${it.available === false ? "unavailable" : ""}">${rowHtml}</div>`;
            }
          });
        }
        menu.innerHTML = html;
      }

      /* ---------------- ADMIN ---------------- */

      document.getElementById("adminToggle").onclick = () => {
        document.getElementById("overlay").classList.remove("hidden");
        renderAdmin();
      };

      function closeAdmin() {
        document.getElementById("overlay").classList.add("hidden");
      }

      document.getElementById("overlay").addEventListener("click", (e) => {
        if (e.target.id === "overlay") closeAdmin();
      });

      function renderAdmin() {
        const panel = document.getElementById("panel");
        if (!unlocked) {
          panel.innerHTML = `
      <div class="panel-header">
        <h2>Owner access</h2>
        <button class="icon-btn" onclick="closeAdmin()">✕</button>
      </div>
      <div class="lock-screen">
        <p style="color:var(--muted); font-size:13.5px;">Enter the 4-digit PIN to edit this menu.</p>
        <div class="field" style="max-width:180px; margin:14px auto;">
          <input type="text" inputmode="numeric" maxlength="4" id="pinInput" placeholder="••••">
        </div>
        <button class="btn btn-primary" onclick="tryUnlock()">Unlock</button>
        <p class="url-note">Default PIN is 1234 — change it once you're in, under Business info.</p>
      </div>`;
          return;
        }

        panel.innerHTML = `
    <div class="panel-header">
      <h2>Edit menu</h2>
      <button class="icon-btn" onclick="closeAdmin()">✕</button>
    </div>

    <div class="admin-section-card">
      <div class="section-heading" style="margin-bottom:10px;">Business info</div>
      <div class="field"><label>Name</label><input type="text" id="fName" value="${escapeHtml(state.business.name)}"></div>
      <div class="field"><label>Tagline</label><input type="text" id="fTagline" value="${escapeHtml(state.business.tagline)}"></div>
      <div class="row">
        <div class="field"><label>Currency symbol</label><input type="text" id="fCurrency" value="${escapeHtml(state.business.currency)}"></div>
        <div class="field"><label>Owner PIN</label><input type="text" inputmode="numeric" maxlength="4" id="fPin" value="${escapeHtml(state.pin)}"></div>
      </div>
      <div class="field">
        <label>Accent theme</label>
        <div class="theme-row" id="themeRow"></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="saveBusinessInfo()">Save business info</button>
    </div>

    <div class="admin-section-card">
      <div class="section-heading" style="margin-bottom:10px;">Share &amp; QR code</div>
      <div class="field">
        <label>Published menu URL</label>
        <input type="text" id="fUrl" placeholder="https://your-menu-link.com" value="${escapeHtml(state.publishedUrl)}">
      </div>
      <button class="btn btn-block" onclick="updateQr()">Generate QR code</button>
      <div class="qr-box" style="margin-top:12px;">
        <div id="qrcode"></div>
        <p class="url-note">Paste the link where you'll host this page (a published artifact link, your own domain, etc.), then generate. Print or display the QR code for customers to scan.</p>
      </div>
    </div>

    <div class="section-heading" style="margin:20px 0 10px;">Menu sections</div>
    <div id="sectionsAdmin"></div>
    <button class="btn btn-block" onclick="addSection()">+ Add section</button>

    <div class="divider"></div>
    <button class="btn btn-danger btn-block" onclick="lockAdmin()">Lock owner settings</button>
  `;

        // theme dots
        const themeRow = document.getElementById("themeRow");
        Object.keys(THEME_NAMES).forEach((key) => {
          const dot = document.createElement("div");
          dot.className =
            "theme-dot " +
            key +
            (state.business.accent === key ? " selected" : "");
          dot.title = THEME_NAMES[key];
          dot.onclick = () => {
            state.business.accent = key;
            render();
            renderAdmin();
            if (state.publishedUrl) updateQr();
          };
          themeRow.appendChild(dot);
        });

        renderSectionsAdmin();
        if (state.publishedUrl) updateQr();
      }

      async function tryUnlock() {
        const val = document.getElementById("pinInput").value.trim();
        try {
          const { data, error } = await supabaseClient.rpc("check_pin", {
            p_slug: MENU_SLUG,
            p_pin: val,
          });
          if (error) throw error;
          if (data === true) {
            sessionPin = val;
            unlocked = true;
            renderAdmin();
          } else {
            showToast("Incorrect PIN");
          }
        } catch (e) {
          showToast("Could not verify PIN — check connection");
        }
      }
      function lockAdmin() {
        unlocked = false;
        sessionPin = null;
        renderAdmin();
      }

      async function saveBusinessInfo() {
        state.business.name =
          document.getElementById("fName").value.trim() || "Your Menu";
        state.business.tagline = document
          .getElementById("fTagline")
          .value.trim();
        state.business.currency =
          document.getElementById("fCurrency").value.trim() || "$";
        const newPin = document.getElementById("fPin").value.trim();
        if (newPin && newPin !== sessionPin) {
          const { data, error } = await supabaseClient.rpc("change_pin", {
            p_slug: MENU_SLUG,
            p_old_pin: sessionPin,
            p_new_pin: newPin,
          });
          if (!error && data === true) {
            sessionPin = newPin;
            showToast("PIN updated");
          } else showToast("Could not update PIN");
        }
        state.publishedUrl = document.getElementById("fUrl")
          ? document.getElementById("fUrl").value.trim()
          : state.publishedUrl;
        saveData(true);
        renderAdmin();
      }

      function updateQr() {
        const url = document.getElementById("fUrl").value.trim();
        state.publishedUrl = url;
        const box = document.getElementById("qrcode");
        box.innerHTML = "";
        if (!url) {
          box.innerHTML =
            '<p class="url-note">Add a URL above to generate a code.</p>';
          return;
        }
        try {
          new QRCode(box, {
            text: url,
            width: 170,
            height: 170,
            colorDark:
              getComputedStyle(document.body)
                .getPropertyValue("--accent")
                .trim() || "#000000",
            colorLight: "#FBF8F1",
          });
        } catch (e) {
          box.innerHTML = '<p class="url-note">Could not generate QR code.</p>';
        }
        saveData(false);
      }

      function renderSectionsAdmin() {
        const wrap = document.getElementById("sectionsAdmin");
        wrap.innerHTML = "";
        state.sections.forEach((sec, sIdx) => {
          const card = document.createElement("div");
          card.className = "admin-section-card";
          card.innerHTML = `
      <div class="admin-section-card-head">
        <input type="text" value="${escapeHtml(sec.title)}" data-role="sectionTitle" data-sid="${sec.id}">
        <button class="btn btn-sm" data-role="moveUp" data-sid="${sec.id}" title="Move up">↑</button>
        <button class="btn btn-sm" data-role="moveDown" data-sid="${sec.id}" title="Move down">↓</button>
        <button class="btn btn-sm btn-danger" data-role="deleteSection" data-sid="${sec.id}">Delete</button>
      </div>
      <div data-role="itemsWrap" data-sid="${sec.id}"></div>
      <button class="btn btn-sm" data-role="addItem" data-sid="${sec.id}">+ Add item</button>
    `;
          wrap.appendChild(card);
          const itemsWrap = card.querySelector('[data-role="itemsWrap"]');
          (sec.items || []).forEach((it) => {
            itemsWrap.appendChild(buildItemCard(sec.id, it));
          });
        });

        wrap.querySelectorAll('[data-role="sectionTitle"]').forEach((el) => {
          el.onchange = () => {
            const sec = state.sections.find((s) => s.id === el.dataset.sid);
            sec.title = el.value.trim() || "Untitled";
            saveData(true);
          };
        });
        wrap.querySelectorAll('[data-role="deleteSection"]').forEach((el) => {
          el.onclick = () => {
            state.sections = state.sections.filter(
              (s) => s.id !== el.dataset.sid,
            );
            if (activeSection === el.dataset.sid)
              activeSection = state.sections[0] ? state.sections[0].id : null;
            saveData(true);
            renderAdmin();
          };
        });
        wrap.querySelectorAll('[data-role="moveUp"]').forEach((el) => {
          el.onclick = () => {
            moveSection(el.dataset.sid, -1);
          };
        });
        wrap.querySelectorAll('[data-role="moveDown"]').forEach((el) => {
          el.onclick = () => {
            moveSection(el.dataset.sid, 1);
          };
        });
        wrap.querySelectorAll('[data-role="addItem"]').forEach((el) => {
          el.onclick = () => {
            const sec = state.sections.find((s) => s.id === el.dataset.sid);
            sec.items = sec.items || [];
            sec.items.push({
              id: uid("i"),
              name: "New item",
              description: "",
              price: "0.00",
              tags: [],
              available: true,
            });
            saveData(true);
            renderAdmin();
          };
        });
      }

      function moveSection(id, dir) {
        const idx = state.sections.findIndex((s) => s.id === id);
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= state.sections.length) return;
        const tmp = state.sections[idx];
        state.sections[idx] = state.sections[newIdx];
        state.sections[newIdx] = tmp;
        saveData(true);
        renderAdmin();
      }

      function buildItemCard(sectionId, item) {
        const div = document.createElement("div");
        div.className = "admin-item-card";
        div.innerHTML = `
    <div class="row">
      <input type="text" value="${escapeHtml(item.name)}" data-field="name" placeholder="Item name">
      <input type="text" value="${escapeHtml(item.price)}" data-field="price" placeholder="Price" style="max-width:90px;">
    </div>
    <div class="field"><input type="text" value="${escapeHtml(item.image || "")}" data-field="image" placeholder="Image URL (optional)"></div>
    <div class="field"><textarea data-field="description" placeholder="Short description">${escapeHtml(item.description)}</textarea></div>
    <div class="tag-toggles"></div>
    <div class="item-card-foot">
      <label class="avail-toggle"><input type="checkbox" data-field="available" ${item.available !== false ? "checked" : ""}> Available</label>
      <button class="btn btn-sm btn-danger" data-field="delete">Delete item</button>
    </div>
  `;
        const nameInput = div.querySelector('[data-field="name"]');
        const priceInput = div.querySelector('[data-field="price"]');
        const imageInput = div.querySelector('[data-field="image"]');
        const descInput = div.querySelector('[data-field="description"]');
        const availInput = div.querySelector('[data-field="available"]');
        const deleteBtn = div.querySelector('[data-field="delete"]');
        const tagWrap = div.querySelector(".tag-toggles");

        function findItem() {
          const sec = state.sections.find((s) => s.id === sectionId);
          return sec ? sec.items.find((i) => i.id === item.id) : null;
        }

        Object.keys(TAG_META).forEach((tagKey) => {
          const chip = document.createElement("span");
          chip.className =
            "tag-chip" + ((item.tags || []).includes(tagKey) ? " on" : "");
          chip.textContent = TAG_META[tagKey].label;
          chip.title = TAG_META[tagKey].title;
          chip.onclick = () => {
            const cur = findItem();
            if (!cur) return;
            cur.tags = cur.tags || [];
            const i = cur.tags.indexOf(tagKey);
            if (i > -1) cur.tags.splice(i, 1);
            else cur.tags.push(tagKey);
            chip.classList.toggle("on");
            saveData(false);
          };
          tagWrap.appendChild(chip);
        });

        nameInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.name = nameInput.value.trim() || "Untitled item";
            saveData(true);
          }
        };
        priceInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.price = priceInput.value.trim() || "0.00";
            saveData(true);
          }
        };
        imageInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.image = imageInput.value.trim();
            saveData(true);
          }
        };
        descInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.description = descInput.value.trim();
            saveData(true);
          }
        };
        availInput.onchange = () => {
          const cur = findItem();
          if (cur) {
            cur.available = availInput.checked;
            saveData(true);
          }
        };
        deleteBtn.onclick = () => {
          const sec = state.sections.find((s) => s.id === sectionId);
          sec.items = sec.items.filter((i) => i.id !== item.id);
          saveData(true);
          renderAdmin();
        };

        return div;
      }

      function addSection() {
        const sec = { id: uid("s"), title: "New section", items: [] };
        state.sections.push(sec);
        if (!activeSection) activeSection = sec.id;
        saveData(true);
        renderAdmin();
      }

      loadData();
    </script>
  </body>
</html>
